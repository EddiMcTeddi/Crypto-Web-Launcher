<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Web Launcher</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root{
  --bg:#000;
  --bg2:#0a0a0a;
  --bg3:#111;
  --orange:#ff6600;
  --orange-dim:#cc4400;
  --white:#e8e8e8;
  --grey:#888;
  --grey-dim:#444;
  --green:#00cc44;
  --red:#ff2222;
  --border:#222;
  --font:'JetBrains Mono', monospace;
}

html, body{
  background:var(--bg);
  color:var(--white);
  font-family:var(--font);
  min-height:100vh;
}

.topbar{
  background:var(--orange);
  color:#000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:4px 12px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
}

.topbar-left,
.topbar-right{
  display:flex;
  gap:16px;
  align-items:center;
}

.topbar-logo{
  font-size:13px;
  font-weight:800;
  letter-spacing:.15em;
}

.stats-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:1px;
  background:var(--border);
}

.stat-cell{
  background:var(--bg);
  padding:8px 12px;
}

.stat-label{
  font-size:9px;
  color:var(--orange);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:4px;
}

.clock-big{
  font-size:28px;
  font-weight:800;
  letter-spacing:-1px;
}

.clock-secs{
  color:var(--orange);
}

.stat-sub{
  font-size:9px;
  color:var(--grey);
  margin-top:4px;
}

.terminal{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--border);
}

.panel,
.chart-panel{
  background:var(--bg);
  padding:10px 12px;
}

.panel-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:10px;
  color:var(--orange);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.12em;
  border-bottom:1px solid var(--orange-dim);
  padding-bottom:4px;
  margin-bottom:8px;
}

.panel-header span{
  color:var(--grey);
  font-size:9px;
  font-weight:400;
}

.chart-meta{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:6px;
}

.chart-price{
  font-size:22px;
  font-weight:800;
}

.chart-change{
  font-size:12px;
  margin-left:8px;
  font-weight:600;
}

.chart-hl{
  font-size:10px;
  color:var(--grey);
  text-align:right;
  line-height:1.5;
}

canvas{
  width:100%;
  height:120px;
  display:block;
}

.notes-area{
  width:100%;
  height:120px;
  resize:none;
  background:var(--bg2);
  border:1px solid var(--border);
  color:var(--white);
  font-family:var(--font);
  font-size:11px;
  padding:8px;
  outline:none;
}

.notes-area:focus{
  border-color:var(--orange);
}

.loading{
  font-size:10px;
  color:var(--grey);
}

.err{
  color:var(--red);
  font-size:10px;
}

.pos{ color:var(--green); }
.neg{ color:var(--red); }

.rbtn{
  background:none;
  border:none;
  color:var(--grey);
  cursor:pointer;
  font-family:var(--font);
}

.ticker-wrap{
  background:#0a0a0a;
  border-top:1px solid var(--orange-dim);
  overflow:hidden;
  padding:5px 0;
}

.ticker-track{
  display:inline-flex;
  white-space:nowrap;
  animation:ticker 30s linear infinite;
}

@keyframes ticker{
  from{ transform:translateX(0); }
  to{ transform:translateX(-50%); }
}

.tick-item{
  padding:0 32px;
  border-right:1px solid var(--border);
  font-size:11px;
}

.tick-sym{
  color:var(--orange);
  margin-right:8px;
}

.tick-price{
  margin-right:6px;
}

.mini-crypto{
  width:100%;
  border-collapse:collapse;
}

.mini-crypto td{
  padding:5px 4px;
  font-size:11px;
}

.mini-crypto tr{
  border-bottom:1px solid var(--border);
}

.mc-name{
  color:var(--orange);
  font-weight:700;
}

.mc-price{
  font-weight:600;
}

.mc-change{
  text-align:right;
  font-weight:600;
}

.wx-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 16px;
}

.wx-label{
  font-size:9px;
  color:var(--orange);
  text-transform:uppercase;
}

.wx-val{
  font-size:18px;
  font-weight:700;
}

.usdnok-val{
  font-size:22px;
  font-weight:800;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Crypto</span>
    <span>Web</span>
    <span>Launcher</span>
    <span id="tb-time">--:--:--</span>
  </div>

  <div class="topbar-right">
    <span>OSLO, NO</span>
    <span id="tb-date">--</span>
    <span id="tb-week">WK --</span>
  </div>
</div>

<div style="background:#000;border-bottom:1px solid #222;padding:8px 12px;display:flex;gap:6px">
  <select id="search-engine" style="background:#111;border:1px solid #333;color:#ff6600;font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 6px;">
    <option value="https://duckduckgo.com/?q=">DDG</option>
    <option value="https://www.google.com/search?q=">GOOGLE</option>
    <option value="https://www.bing.com/search?q=">BING</option>
  </select>

  <input
    id="search-input"
    type="text"
    placeholder="SØK..."
    style="flex:1;background:#0a0a0a;border:1px solid #333;border-left:2px solid #ff6600;color:#e8e8e8;font-family:'JetBrains Mono',monospace;font-size:12px;padding:5px 10px;outline:none;"
  />

  <button onclick="doSearch()" style="background:#ff6600;border:none;color:#000;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:5px 12px;cursor:pointer">
    SØK
  </button>
</div>

<div class="stats-row">

  <div class="stat-cell">
    <div class="stat-label">TIME</div>
    <div class="clock-big">
      <span id="hm">--:--</span>
      <span class="clock-secs">:<span id="secs">--</span></span>
    </div>
    <div class="stat-sub" id="date-full">--</div>
  </div>

  <div class="stat-cell">
    <div class="stat-label">WEATHER — ASKIM</div>
    <div id="wx-stat"><span class="loading">henter...</span></div>
  </div>

  <div class="stat-cell">
    <div class="stat-label">USD/NOK</div>
    <div id="usdnok-val"><span class="loading">henter...</span></div>
    <div class="stat-sub" id="usdnok-sub">—</div>
  </div>

  <div class="stat-cell">
    <div class="stat-label">FEAR & GREED</div>
    <div id="fg-val"><span class="loading">henter...</span></div>
  </div>

  <div class="stat-cell">
    <div class="stat-label">NOTATER</div>
    <textarea class="notes-area" id="notes-area" placeholder="// skriv her..."></textarea>
  </div>

</div>

<div class="terminal">

  <div class="chart-panel">
    <div class="panel-header">
      BTC/USD — 24H
      <button class="rbtn" onclick="fetchCharts()">⟳ REFRESH</button>
    </div>

    <div class="chart-meta">
      <div>
        <span class="chart-price" id="btc-price">--</span>
        <span class="chart-change" id="btc-change">--</span>
      </div>

      <div class="chart-hl" id="btc-hl">
        H: --<br>
        L: --
      </div>
    </div>

    <canvas id="btc-chart"></canvas>
  </div>

  <div class="chart-panel">
    <div class="panel-header">
      ETH/USD — 24H
      <button class="rbtn" onclick="fetchCharts()">⟳ REFRESH</button>
    </div>

    <div class="chart-meta">
      <div>
        <span class="chart-price" id="eth-price">--</span>
        <span class="chart-change" id="eth-change">--</span>
      </div>

      <div class="chart-hl" id="eth-hl">
        H: --<br>
        L: --
      </div>
    </div>

    <canvas id="eth-chart"></canvas>
  </div>

  <div class="panel">
    <div class="panel-header">ALT COINS</div>
    <div id="mini-crypto-content">
      <span class="loading">henter...</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      METEOROLOGI — ASKIM
    </div>

    <div id="wx-detail">
      <span class="loading">henter...</span>
    </div>
  </div>

</div>

<div class="ticker-wrap">
  <div class="ticker-track" id="ticker-track">
    <span class="tick-item">LOADING...</span>
  </div>
</div>

<script>

/* CLOCK */

const DAYS = ['SØN','MAN','TIR','ONS','TOR','FRE','LØR'];
const MONTHS = ['JAN','FEB','MAR','APR','MAI','JUN','JUL','AUG','SEP','OKT','NOV','DES'];

function pad(n){
  return String(n).padStart(2,'0');
}

function getWeekNumber(d){
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function updateClock(){
  const now = new Date();

  const h = pad(now.getHours());
  const m = pad(now.getMinutes());
  const s = pad(now.getSeconds());

  document.getElementById('hm').textContent = `${h}:${m}`;
  document.getElementById('secs').textContent = s;
  document.getElementById('tb-time').textContent = `${h}:${m}:${s}`;

  const dateStr =
    `${DAYS[now.getDay()]} ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

  document.getElementById('date-full').textContent = dateStr;
  document.getElementById('tb-date').textContent = dateStr;
  document.getElementById('tb-week').textContent =
    `WK ${getWeekNumber(now)}`;
}

setInterval(updateClock, 1000);
updateClock();

/* WEATHER */

const WMO = {
  0:'KLARVÆR',
  1:'NESTEN KLART',
  2:'DELVIS SKYET',
  3:'OVERSKYET',
  45:'TÅKE',
  61:'REGN',
  71:'SNØ'
};

async function fetchWeather(){
  try{
    const r = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=59.551606&longitude=11.168506&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code&wind_speed_unit=ms&timezone=Europe%2FOslo'
    );

    const d = await r.json();
    const c = d.current;

    const desc = WMO[c.weather_code] || 'UKJENT';

    document.getElementById('wx-stat').innerHTML = `
      <div style="font-size:18px;font-weight:800">
        ${Math.round(c.temperature_2m)}°C
      </div>
      <div style="font-size:9px;color:var(--grey)">
        ${desc}
      </div>
    `;

    document.getElementById('wx-detail').innerHTML = `
      <div class="wx-grid">

        <div>
          <div class="wx-label">TEMP</div>
          <div class="wx-val">${Math.round(c.temperature_2m)}°C</div>
        </div>

        <div>
          <div class="wx-label">FUKTIGHET</div>
          <div class="wx-val">${c.relative_humidity_2m}%</div>
        </div>

        <div>
          <div class="wx-label">VIND</div>
          <div class="wx-val">${c.wind_speed_10m} M/S</div>
        </div>

        <div>
          <div class="wx-label">FORHOLD</div>
          <div class="wx-val" style="font-size:13px">${desc}</div>
        </div>

      </div>
    `;

  } catch(e){

    console.error(e);

    document.getElementById('wx-stat').innerHTML =
      '<span class="err">ERR</span>';
  }
}

/* USD/NOK */

async function fetchUsdNok(){

  try{

    const r = await fetch(
      'https://open.er-api.com/v6/latest/USD'
    );

    const d = await r.json();

    const rate = d.rates.NOK;

    document.getElementById('usdnok-val').innerHTML =
      `<div class="usdnok-val">${rate.toFixed(4)}</div>`;

    document.getElementById('usdnok-sub').textContent =
      `1 USD = ${rate.toFixed(2)} NOK`;

  } catch(e){

    console.error(e);

    document.getElementById('usdnok-val').innerHTML =
      '<span class="err">ERR</span>';
  }
}

/* FEAR GREED */

async function fetchFearGreed(){

  try{

    const r = await fetch(
      'https://api.alternative.me/fng/?limit=1'
    );

    const d = await r.json();

    const val = d.data[0].value;

    document.getElementById('fg-val').innerHTML =
      `<div style="font-size:24px;font-weight:800">${val}</div>`;

  } catch(e){

    console.error(e);

    document.getElementById('fg-val').innerHTML =
      '<span class="err">ERR</span>';
  }
}

/* CHARTS */

function drawChart(canvasId, prices, color){

  const canvas = document.getElementById(canvasId);

  const ctx = canvas.getContext('2d');

  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = 120;

  ctx.clearRect(0,0,W,H);

  const min = Math.min(...prices);
  const max = Math.max(...prices);

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();

  prices.forEach((p,i)=>{

    const x = (i/(prices.length-1))*W;
    const y = H - ((p-min)/(max-min))*H;

    if(i===0){
      ctx.moveTo(x,y);
    } else {
      ctx.lineTo(x,y);
    }
  });

  ctx.stroke();
}

function fmtUsd(n){

  if(n >= 1000){
    return '$' + Math.round(n).toLocaleString('no-NO');
  }

  return '$' + n.toFixed(2);
}

async function fetchCharts(){

  try{

    const btcR = await fetch(
      'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1'
    );

    const btcD = await btcR.json();

    const btcPrices =
      btcD.prices.map(p => p[1]);

    const btcCur =
      btcPrices[btcPrices.length-1];

    document.getElementById('btc-price').textContent =
      fmtUsd(btcCur);

    drawChart(
      'btc-chart',
      btcPrices,
      '#00cc44'
    );

    const ethR = await fetch(
      'https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=1'
    );

    const ethD = await ethR.json();

    const ethPrices =
      ethD.prices.map(p => p[1]);

    const ethCur =
      ethPrices[ethPrices.length-1];

    document.getElementById('eth-price').textContent =
      fmtUsd(ethCur);

    drawChart(
      'eth-chart',
      ethPrices,
      '#ff6600'
    );

  } catch(e){

    console.error(e);

    document.getElementById('btc-price').innerHTML =
      '<span class="err">ERR</span>';

    document.getElementById('eth-price').innerHTML =
      '<span class="err">ERR</span>';
  }
}

/* MINI CRYPTO */

async function fetchMiniCrypto(){

  try{

    const r = await fetch(
      'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple&vs_currencies=usd,nok&include_24hr_change=true'
    );

    const d = await r.json();

    const coins = [
      ['BTC', d.bitcoin],
      ['ETH', d.ethereum],
      ['SOL', d.solana],
      ['XRP', d.ripple]
    ];

    let rows = '';
    let ticker = '';

    coins.forEach(c=>{

      const sym = c[0];
      const data = c[1];

      const chg = data.usd_24h_change || 0;

      const cls =
        chg >= 0 ? 'pos' : 'neg';

      rows += `
        <tr>
          <td class="mc-name">${sym}</td>
          <td class="mc-price">${fmtUsd(data.usd)}</td>
          <td class="mc-change ${cls}">
            ${chg.toFixed(2)}%
          </td>
        </tr>
      `;

      ticker += `
        <span class="tick-item">
          <span class="tick-sym">${sym}</span>
          <span class="tick-price">${fmtUsd(data.usd)}</span>
        </span>
      `;
    });

    document.getElementById('mini-crypto-content').innerHTML =
      `<table class="mini-crypto">${rows}</table>`;

    document.getElementById('ticker-track').innerHTML =
      ticker + ticker;

  } catch(e){

    console.error(e);

    document.getElementById('mini-crypto-content').innerHTML =
      '<span class="err">ERR</span>';
  }
}

/* NOTES */

const notesKey = 'crypto_web_launcher_notes';

const notesEl =
  document.getElementById('notes-area');

notesEl.value =
  localStorage.getItem(notesKey) || '';

notesEl.addEventListener('input', ()=>{

  localStorage.setItem(
    notesKey,
    notesEl.value
  );
});

/* SEARCH */

function doSearch(){

  const q =
    document.getElementById('search-input')
    .value
    .trim();

  if(!q) return;

  const base =
    document.getElementById('search-engine')
    .value;

  window.open(
    base + encodeURIComponent(q),
    '_blank'
  );
}

document
.getElementById('search-input')
.addEventListener('keydown', e=>{

  if(e.key === 'Enter'){
    doSearch();
  }
});

/* INIT */

fetchWeather();
fetchUsdNok();
fetchFearGreed();
fetchCharts();
fetchMiniCrypto();

setInterval(fetchWeather, 300000);
setInterval(fetchUsdNok, 60000);
setInterval(fetchFearGreed, 300000);
setInterval(fetchCharts, 300000);
setInterval(fetchMiniCrypto, 60000);

</script>
</body>
</html>
