<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Web Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --bg2: #0a0a0a;
      --bg3: #111111;
      --orange: #ff6600;
      --orange-dim: #cc4400;
      --white: #e8e8e8;
      --grey: #888888;
      --grey-dim: #444444;
      --green: #00cc44;
      --red: #ff2222;
      --border: #222222;
      --font: 'JetBrains Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    .topbar {
      background: var(--orange);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .topbar-left { display: flex; gap: 20px; align-items: center; }
    .topbar-logo { font-size: 13px; font-weight: 800; letter-spacing: 0.15em; }
    .topbar-right { display: flex; gap: 16px; font-size: 10px; }

    .terminal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
    }

    .panel {
      background: var(--bg);
      padding: 10px 12px;
      position: relative;
    }

    .panel-header {
      font-size: 10px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--orange-dim);
      padding-bottom: 4px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header span { color: var(--grey); font-weight: 400; font-size: 9px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1px;
      background: var(--border);
      grid-column: 1 / 3;
    }

    .stat-cell {
      background: var(--bg);
      padding: 8px 12px;
    }

    .stat-label {
      font-size: 9px;
      color: var(--orange);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      font-variant-numeric: tabular-nums;
    }

    .stat-sub {
      font-size: 9px;
      color: var(--grey);
      margin-top: 2px;
    }

    .clock-big {
      font-size: 28px;
      font-weight: 800;
      color: var(--white);
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
    }

    .clock-secs { color: var(--orange); }

    .chart-panel {
      background: var(--bg);
      padding: 10px 12px;
    }

    .chart-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 6px;
    }

    .chart-price {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      font-variant-numeric: tabular-nums;
    }

    .chart-change {
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }

    .chart-hl {
      font-size: 10px;
      color: var(--grey);
      text-align: right;
      line-height: 1.6;
    }

    canvas {
      width: 100%;
      height: 120px;
      display: block;
    }

    .mini-crypto { width: 100%; border-collapse: collapse; }
    .mini-crypto tr { border-bottom: 1px solid var(--border); }
    .mini-crypto tr:last-child { border-bottom: none; }
    .mini-crypto td {
      padding: 5px 4px;
      font-size: 11px;
      vertical-align: middle;
    }

    .mc-name { color: var(--orange); font-weight: 700; width: 40px; }
    .mc-price { color: var(--white); font-weight: 600; font-variant-numeric: tabular-nums; }
    .mc-change { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }

    .wx-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 16px;
      margin-top: 4px;
    }

    .wx-label { font-size: 9px; color: var(--orange); text-transform: uppercase; letter-spacing: 0.1em; }
    .wx-val { font-size: 18px; font-weight: 700; color: var(--white); }
    .wx-sub { font-size: 10px; color: var(--grey); }

    .notes-area {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: var(--font);
      font-size: 11px;
      line-height: 1.7;
      padding: 8px;
      resize: none;
      height: 120px;
      outline: none;
    }

    .notes-area:focus { border-color: var(--orange); }
    .notes-area::placeholder { color: var(--grey-dim); }

    .fg-bar-wrap {
      margin-top: 6px;
      background: var(--bg3);
      height: 8px;
      width: 100%;
      position: relative;
    }

    .fg-bar {
      height: 100%;
      background: linear-gradient(to right, var(--red), #ff8800, var(--green));
      width: 100%;
      position: absolute;
      top: 0; left: 0;
    }

    .fg-needle {
      position: absolute;
      top: -3px;
      width: 2px;
      height: 14px;
