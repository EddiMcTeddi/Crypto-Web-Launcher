<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Web Launcher FIXED</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;800&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#000; --bg2:#0a0a0a; --bg3:#111;
  --orange:#ff6600; --green:#00cc44; --red:#ff2222;
  --grey:#888; --border:#222; --white:#e8e8e8;
  --font:JetBrains Mono, monospace;
}

html,body{
  height:100vh;
  background:var(--bg);
  color:var(--white);
  font-family:var(--font);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOP */
.topbar{
  background:var(--orange);
  color:#000;
  font-size:11px;
  font-weight:800;
  display:flex;
  justify-content:space-between;
  padding:4px 10px;
}

/* SEARCH */
.search-bar{
  display:flex;
  gap:6px;
  padding:6px;
  background:#000;
  border-bottom:1px solid var(--border);
}
.search-input{
  flex:1;
  background:#0a0a0a;
  border:1px solid #333;
  color:#fff;
  padding:4px 8px;
}
.search-btn{
  background:var(--orange);
  border:0;
  padding:4px 10px;
  font-weight:800;
  cursor:pointer;
}

/* GRID */
.grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:1px;
  background:var(--border);
}

.panel{
  background:#000;
  padding:10px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.header{
  font-size:10px;
  font-weight:800;
  color:var(--orange);
  border-bottom:1px solid #333;
  margin-bottom:6px;
  padding-bottom:3px;
}

.big{
  font-size:20px;
  font-weight:800;
}
.sub{font-size:10px;color:var(--grey)}
.err{color:var(--red);font-size:10px}
.load{color:var(--grey);font-size:10px}

canvas{width:100%!important;height:100%!important}
.pos{color:var(--green)}
.neg{color:var(--red)}

</style>
</head>

<body>

<div class="topbar">
  <div>Crypto Launcher FIXED FULL</div>
  <div id="clock">--</div>
</div>

<div class="search-bar">
  <input id="q" class="search-input" placeholder="Søk..."/>
  <button class="search-btn" onclick="search()">Søk</button>
</div>

<div class="grid">

  <div class="panel">
    <div class="header">BTC / USD</div>
    <div class="big" id="btcPrice"><span class="load">loading...</span></div>
    <div class="sub" id="btcChange"></div>
    <canvas id="btcChart"></canvas>
  </div>

  <div class="panel">
    <div class="header">ETH / USD</div>
    <div class="big" id="ethPrice"><span class="load">loading...</span></div>
    <div class="sub" id="ethChange"></div>
    <canvas id="ethChart"></canvas>
  </div>

</div>

<script>

const API="https://api.coincap.io/v2/assets";
const DAY=24*60*60*1000;

/* SAFE HELPERS */
const safeNum=v=>isFinite(v)?v:null;

function fmt(n){
  if(!isFinite(n)) return "ERR";
  return n>1000
    ? "$"+Math.round(n).toLocaleString("no-NO")
    : "$"+n.toFixed(2);
}

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").textContent=
    new Date().toLocaleTimeString("no-NO");
},1000);

/* SEARCH */
function search(){
  const q=document.getElementById("q").value.trim();
  if(!q) return;
  window.open("https://duckduckgo.com/?q="+encodeURIComponent(q));
}

/* DRAW CHART */
function draw(id, data, color){
  if(!Array.isArray(data) || data.length<2) return;

  const canvas=document.getElementById(id);
  const ctx=canvas.getContext("2d");

  const w=canvas.width=canvas.clientWidth;
  const h=canvas.height=canvas.clientHeight;

  const min=Math.min(...data);
  const max=Math.max(...data);
  const range=(max-min)||1;

  ctx.clearRect(0,0,w,h);

  ctx.strokeStyle="#111";
  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(0,(h/3)*i);
    ctx.lineTo(w,(h/3)*i);
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.strokeStyle=color;
  ctx.lineWidth=1.5;

  data.forEach((p,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((p-min)/range)*h;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });

  ctx.stroke();
}

/* LOAD ASSET */
async function load(asset, priceId, changeId, chartId){

  try{
    const end=Date.now();
    const start=end-DAY;

    const res=await fetch(
      `${API}/${asset}/history?interval=m15&start=${start}&end=${end}`
    );

    const json=await res.json();
    const arr=Array.isArray(json?.data)?json.data:[];

    const prices=arr
      .map(x=>safeNum(parseFloat(x.priceUsd)))
      .filter(v=>v!==null);

    if(prices.length<2) throw new Error("bad data");

    const cur=prices.at(-1);
    const open=prices[0];

    const change=((cur-open)/open)*100;

    document.getElementById(priceId).textContent=fmt(cur);

    const el=document.getElementById(changeId);
    el.textContent=(change>=0?"▲ ":"▼ ")+Math.abs(change).toFixed(2)+"%";
    el.className="sub "+(change>=0?"pos":"neg");

    draw(chartId, prices, change>=0?"#00cc44":"#ff2222");

  }catch(e){
    document.getElementById(priceId).innerHTML="<span class='err'>API FAIL</span>";
  }
}

/* INIT */
load("bitcoin","btcPrice","btcChange","btcChart");
load("ethereum","ethPrice","ethChange","ethChart");

/* REFRESH */
setInterval(()=>load("bitcoin","btcPrice","btcChange","btcChart"),300000);
setInterval(()=>load("ethereum","ethPrice","ethChange","ethChart"),300000);

window.addEventListener("resize",()=>{
  load("bitcoin","btcPrice","btcChange","btcChart");
  load("ethereum","ethPrice","ethChange","ethChart");
});

</script>

</body>
</html>
