<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Web Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --bg2: #0a0a0a;
      --bg3: #111111;
      --orange: #ff6600;
      --orange-dim: #cc4400;
      --white: #e8e8e8;
      --grey: #888888;
      --grey-dim: #444444;
      --green: #00cc44;
      --red: #ff2222;
      --border: #222222;
      --font: 'JetBrains Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--orange);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .topbar-left { display: flex; gap: 15px; align-items: center; }
    .topbar-logo { font-size: 13px; font-weight: 800; letter-spacing: 0.15em; }
    .topbar-right { display: flex; gap: 16px; font-size: 10px; }

    .search-bar {
      background: #000;
      border-bottom: 1px solid var(--border);
      padding: 6px 12px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .search-select {
      background: #111;
      border: 1px solid #333;
      color: var(--orange);
      font-family: var(--font);
      font-size: 11px;
      padding: 4px 6px;
      outline: none;
      cursor: pointer;
    }

    .search-input {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #333;
      border-left: 2px solid var(--orange);
      color: var(--white);
      font-family: var(--font);
      font-size: 11px;
      padding: 4px 10px;
      outline: none;
    }

    .search-btn {
      background: var(--orange);
      border: none;
      color: #000;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }

    .dashboard-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }

    .panel {
      background: var(--bg);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .panel-header {
      font-size: 10px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--orange-dim);
      padding-bottom: 3px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .panel-header span { color: var(--grey); font-weight: 400; font-size: 9px; }
    .panel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .stat-label {
      font-size: 9px;
      color: var(--orange);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .clock-big {
      font-size: 26px;
      font-weight: 800;
      color: var(--white);
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      line-height: 1.2;
    }

    .clock-secs { color: var(--orange); }
    .stat-sub { font-size: 9px; color: var(--grey); margin-top: 1px; }

    .chart-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .chart-price {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      font-variant-numeric: tabular-nums;
    }

    .chart-change { font-size: 11px; font-weight: 600; margin-left: 6px; }
    .chart-hl { font-size: 9px; color: var(--grey); text-align: right; line-height: 1.4; }

    .chart-container { flex: 1; min-height: 0; position: relative; width: 100%; }
    canvas { width: 100% !important; height: 100% !important; display: block; }

    .mini-crypto { width: 100%; border-collapse: collapse; }
    .mini-crypto tr { border-bottom: 1px solid var(--border); }
    .mini-crypto tr:last-child { border-bottom: none; }
    .mini-crypto td { padding: 3px 2px; font-size: 10px; vertical-align: middle; }

    .mc-name { color: var(--orange); font-weight: 700; width: 36px; }
    .mc-price { color: var(--white); font-weight: 600; font-variant-numeric: tabular-nums; }
    .mc-change { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }

    .wx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; }
    .wx-label { font-size: 8px; color: var(--orange); text-transform: uppercase; letter-spacing: 0.1em; }
    .wx-val { font-size: 14px; font-weight: 700; color: var(--white); }
    .wx-sub { font-size: 9px; color: var(--grey); }

    .notes-area {
      width: 100%;
      height: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: var(--font);
      font-size: 11px;
      line-height: 1.5;
      padding: 6px;
      resize: none;
      outline: none;
    }
    .notes-area:focus { border-color: var(--orange); }
    .notes-area::placeholder { color: var(--grey-dim); }

    .fg-bar-wrap { margin-top: 4px; background: var(--bg3); height: 6px; width: 100%; position: relative; }
    .fg-bar { height: 100%; background: linear-gradient(to right, var(--red), #ff8800, var(--green)); width: 100%; position: absolute; top: 0; left: 0; }
    .fg-needle { position: absolute; top: -3px; width: 2px; height: 12px; background: var(--white); transform: translateX(-50%); }
    .fg-value { font-size: 20px; font-weight: 800; margin-top: 2px; }

    .ticker-wrap { background: #0a0a0a; border-top: 1px solid var(--orange-dim); overflow: hidden; padding: 4px 0; flex-shrink: 0; }
    .ticker-track { display: inline-flex; white-space: nowrap; animation: ticker 40s linear infinite; font-size: 11px; font-weight: 600; }

    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .tick-item { padding: 0 20px; border-right: 1px solid var(--border); display: inline-flex; align-items: center; gap: 6px; }
    .tick-sym { color: var(--orange); font-weight: 700; }
    .tick-price { color: var(--white); }

    .rbtn { background: none; border: none; color: var(--grey-dim); cursor: pointer; font-size: 11px; font-family: var(--font); padding: 0; transition: color 0.15s; }
    .rbtn:hover { color: var(--orange); }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .loading { font-size: 10px; color: var(--grey); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .err { font-size: 10px; color: var(--red); }
    .usdnok-val { font-size: 20px; font-weight: 800; color: var(--white); font-variant-numeric: tabular-nums; }

    .calc-container { display: flex; flex-direction: column; height: 100%; justify-content: space-between; }
    .calc-display { background: var(--bg2); border: 1px solid var(--border); padding: 4px 6px; margin-bottom: 4px; text-align: right; min-height: 36px; display: flex; flex-direction: column; justify-content: center; }
    .calc-expr { font-size: 8px; color: var(--grey); min-height: 10px; letter-spacing: 0.05em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .calc-val { font-size: 15px; font-weight: 800; color: var(--white); font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; flex: 1; }
    .cbtn { background: var(--bg3); border: 1px solid var(--border); color: var(--white); font-family: var(--font); font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.1s; }
    .cbtn:hover { background: var(--border); }
    .cbtn.op { color: var(--orange); }
    .cbtn.eq { background: var(--orange); color: #000; font-weight: 800; }
    .cbtn.ac { color: var(--red); }
    .cbtn.span2 { grid-column: span 2; }

    @media (max-width: 1024px) {
      .dashboard-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">Crypto</span>
    <span>Web Launcher</span>
    <span id="tb-time">--:--:--</span>
  </div>
  <div class="topbar-right">
    <span>ASKIM, NO</span>
    <span id="tb-date">--</span>
    <span id="tb-week">WK --</span>
  </div>
</div>

<div class="search-bar">
  <select id="search-engine" class="search-select">
    <option value="https://duckduckgo.com/?q=">DDG</option>
    <option value="https://www.google.com/search?q=">GOOGLE</option>
    <option value="https://www.bing.com/search?q=">BING</option>
    <option value="https://www.startpage.com/search?q=">STARTPAGE</option>
    <option value="https://www.perplexity.ai/search?q=">PERPLEXITY</option>
  </select>
  <input id="search-input" type="text" placeholder="SØK..." class="search-input" />
  <button onclick="doSearch()" class="search-btn">SØK</button>
</div>

<div class="dashboard-grid">

  <div class="panel">
    <div class="panel-header">System Time</div>
    <div class="panel-body">
      <div class="clock-big"><span id="hm">--:--</span><span class="clock-secs">:<span id="secs">--</span></span></div>
      <div class="stat-sub" id="date-full">--</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">USD/NOK &amp; Fear&Greed</div>
    <div class="panel-body" style="gap:8px;">
      <div>
        <div class="stat-label" style="font-size:8px;">USD / NOK</div>
        <div id="usdnok-val"><span class="loading">henter...</span></div>
        <div class="stat-sub" id="usdnok-sub">—</div>
      </div>
      <div style="border-top:1px dashed var(--border);padding-top:4px;">
        <div class="stat-label" style="font-size:8px;">FEAR &amp; GREED</div>
        <div id="fg-val"><span class="loading">henter...</span></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Kalkulator</div>
    <div class="calc-container">
      <div class="calc-display">
        <div class="calc-expr" id="calc-expr"></div>
        <div class="calc-val" id="calc-val">0</div>
      </div>
      <div class="calc-grid">
        <button class="cbtn ac" onclick="calcAC()">AC</button>
        <button class="cbtn" onclick="calcToggleSign()">+/−</button>
        <button class="cbtn" onclick="calcPercent()">%</button>
        <button class="cbtn op" onclick="calcOp('/')">÷</button>
        <button class="cbtn" onclick="calcNum('7')">7</button>
        <button class="cbtn" onclick="calcNum('8')">8</button>
        <button class="cbtn" onclick="calcNum('9')">9</button>
        <button class="cbtn op" onclick="calcOp('*')">×</button>
        <button class="cbtn" onclick="calcNum('4')">4</button>
        <button class="cbtn" onclick="calcNum('5')">5</button>
        <button class="cbtn" onclick="calcNum('6')">6</button>
        <button class="cbtn op" onclick="calcOp('-')">−</button>
        <button class="cbtn" onclick="calcNum('1')">1</button>
        <button class="cbtn" onclick="calcNum('2')">2</button>
        <button class="cbtn" onclick="calcNum('3')">3</button>
        <button class="cbtn op" onclick="calcOp('+')">+</button>
        <button class="cbtn span2" onclick="calcNum('0')">0</button>
        <button class="cbtn" onclick="calcDot()">.</button>
        <button class="cbtn eq" onclick="calcEq()">=</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Notater</div>
    <textarea class="notes-area" id="notes-area" placeholder="// skriv her..."></textarea>
  </div>

  <div class="panel">
    <div class="panel-header">BTC/USD — 24H <span><button class="rbtn" onclick="fetchCharts()">⟳</button></span></div>
    <div class="chart-meta">
      <div>
        <span class="chart-price" id="btc-price">--</span>
        <span class="chart-change" id="btc-change">--</span>
      </div>
      <div class="chart-hl" id="btc-hl">H: --<br>L: --</div>
    </div>
    <div class="chart-container"><canvas id="btc-chart"></canvas></div>
  </div>

  <div class="panel">
    <div class="panel-header">ETH/USD — 24H <span><button class="rbtn" onclick="fetchCharts()">⟳</button></span></div>
    <div class="chart-meta">
      <div>
        <span class="chart-price" id="eth-price">--</span>
        <span class="chart-change" id="eth-change">--</span>
      </div>
      <div class="chart-hl" id="eth-hl">H: --<br>L: --</div>
    </div>
    <div class="chart-container"><canvas id="eth-chart"></canvas></div>
  </div>

  <div class="panel">
    <div class="panel-header">Alt Coins <span>Live · 8 coins</span></div>
    <div id="mini-crypto-content" class="panel-body" style="justify-content:flex-start;">
      <span class="loading">henter...</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Vær — Askim <span><button class="rbtn" onclick="fetchWeather()">⟳</button></span></div>
    <div id="wx-detail" class="panel-body">
      <span class="loading">henter...</span>
    </div>
  </div>

</div>

<div class="ticker-wrap">
  <div class="ticker-track" id="ticker-track">
    <span class="tick-item"><span class="tick-sym">BTC</span><span class="tick-price">LOADING...</span></span>
  </div>
</div>

<script>
  const DAYS   = ['SØN','MAN','TIR','ONS','TOR','FRE','LØR'];
  const MONTHS = ['JAN','FEB','MAR','APR','MAI','JUN','JUL','AUG','SEP','OKT','NOV','DES'];

  function pad(n) { return String(n).padStart(2,'0'); }

  function getWeekNumber(d) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
  }

  function updateClock() {
    const now = new Date();
    const h = pad(now.getHours()), m = pad(now.getMinutes()), s = pad(now.getSeconds());
    document.getElementById('hm').textContent = h + ':' + m;
    document.getElementById('secs').textContent = s;
    document.getElementById('tb-time').textContent = h + ':' + m + ':' + s;
    const dateStr = DAYS[now.getDay()] + ' ' + now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
    document.getElementById('date-full').textContent = dateStr;
    document.getElementById('tb-date').textContent = now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
    document.getElementById('tb-week').textContent = 'WK ' + getWeekNumber(now);
  }
  setInterval(updateClock, 1000);
  updateClock();

  function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    window.open(document.getElementById('search-engine').value + encodeURIComponent(q), '_blank');
  }
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  /* CALCULATOR */
  let calcCurrent = '0', calcPrev = '', calcOper = null, calcFresh = false;

  function calcUpdate() {
    const disp = parseFloat(calcCurrent);
    const formatted = isNaN(disp) ? 'ERR' :
      Math.abs(disp) >= 1e9 ? disp.toExponential(3) :
      disp % 1 !== 0 ? String(parseFloat(disp.toFixed(6))) :
      disp.toLocaleString('no-NO');
    document.getElementById('calc-val').textContent = formatted;
  }

  function calcNum(n) {
    if (calcFresh) { calcCurrent = n; calcFresh = false; }
    else if (calcCurrent === '0' && n !== '.') calcCurrent = n;
    else if (calcCurrent.length < 12) calcCurrent += n;
    calcUpdate();
  }

  function calcDot() {
    if (calcFresh) { calcCurrent = '0.'; calcFresh = false; return; }
    if (!calcCurrent.includes('.')) calcCurrent += '.';
    calcUpdate();
  }

  function calcOp(op) {
    if (calcOper && !calcFresh) calcEq();
    calcPrev = calcCurrent; calcOper = op; calcFresh = true;
    const s = { '+':'+', '-':'−', '*':'×', '/':'÷' };
    document.getElementById('calc-expr').textContent = calcPrev + ' ' + s[op];
  }

  function calcEq() {
    if (!calcOper) return;
    const a = parseFloat(calcPrev), b = parseFloat(calcCurrent);
    const s = { '+':'+', '-':'−', '*':'×', '/':'÷' };
    document.getElementById('calc-expr').textContent = calcPrev + ' ' + s[calcOper] + ' ' + calcCurrent + ' =';
    let result;
    if (calcOper === '+') result = a + b;
    else if (calcOper === '-') result = a - b;
    else if (calcOper === '*') result = a * b;
    else if (calcOper === '/') result = b !== 0 ? a / b : NaN;
    calcCurrent = isNaN(result) ? '0' : String(parseFloat(result.toFixed(10)));
    calcOper = null; calcFresh = true;
    calcUpdate();
  }

  function calcAC() {
    calcCurrent = '0'; calcPrev = ''; calcOper = null; calcFresh = false;
    document.getElementById('calc-expr').textContent = '';
    calcUpdate();
  }

  function calcToggleSign() {
    if (calcCurrent !== '0') calcCurrent = calcCurrent.startsWith('-') ? calcCurrent.slice(1) : '-' + calcCurrent;
    calcUpdate();
  }

  function calcPercent() { calcCurrent = String(parseFloat(calcCurrent) / 100); calcUpdate(); }

  document.addEventListener('keydown', e => {
    if (document.activeElement === document.getElementById('search-input') ||
        document.activeElement === document.getElementById('notes-area')) return;
    if (e.key >= '0' && e.key <= '9') calcNum(e.key);
    else if (e.key === '.') calcDot();
    else if (e.key === '+') calcOp('+');
    else if (e.key === '-') calcOp('-');
    else if (e.key === '*') calcOp('*');
    else if (e.key === '/') { e.preventDefault(); calcOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calcEq();
    else if (e.key === 'Escape') calcAC();
    else if (e.key === 'Backspace') {
      calcCurrent = calcCurrent.length > 1 ? calcCurrent.slice(0,-1) : '0';
      calcUpdate();
    }
  });

  /* WEATHER */
  const WMO = {
    0:'KLARVÆR', 1:'NESTEN KLART', 2:'DELVIS SKYET', 3:'OVERSKYET',
    45:'TÅKE', 48:'RIMTÅKE', 51:'LETT YR', 53:'MODERAT YR', 55:'KRAFTIG YR',
    61:'LETT REGN', 63:'MODERAT REGN', 65:'KRAFTIG REGN',
    71:'LETT SNØ', 73:'MODERAT SNØ', 75:'KRAFTIG SNØ',
    80:'REGNBYGER', 81:'MOD. REGNBYGER', 82:'KRAFTIGE BYGER',
    95:'TORDENVÆR', 96:'TORDENVÆR/HAGL'
  };

  async function fetchWeather() {
    try {
      const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=59.5516&longitude=11.1685&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weathercode&wind_speed_unit=ms&timezone=Europe%2FOslo');
      const d = await r.json();
      const c = d.current;
      const desc = WMO[c.weathercode] || 'UKJENT';
      document.getElementById('wx-detail').innerHTML = `
        <div class="wx-grid">
          <div><div class="wx-label">TEMP</div><div class="wx-val">${Math.round(c.temperature_2m)}°C</div><div class="wx-sub">FØLES ${Math.round(c.apparent_temperature)}°C</div></div>
          <div><div class="wx-label">FUKT</div><div class="wx-val">${c.relative_humidity_2m}%</div><div class="wx-sub">RELATIV</div></div>
          <div><div class="wx-label">VIND</div><div class="wx-val">${c.wind_speed_10m}<span style="font-size:10px"> M/S</span></div></div>
          <div><div class="wx-label">STATUS</div><div style="font-size:10px;font-weight:700;color:var(--white);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${desc}</div></div>
        </div>`;
    } catch(e) {
      document.getElementById('wx-detail').innerHTML = '<span class="err">FEIL VED HENTING</span>';
    }
  }

  /* CHARTS */
  function drawChart(canvasId, prices, color) {
    const canvas = document.getElementById(canvasId);
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const W = container.clientWidth, H = container.clientHeight || 90;
    canvas.width = W * dpr; canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const min = Math.min(...prices), max = Math.max(...prices);
    const range = max - min || 1, p = 6;
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
    for (let i = 0; i <= 3; i++) {
      const y = p + ((H - p*2) / 3) * i;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    prices.forEach((price, i) => {
      const x = (i / (prices.length - 1)) * W;
      const y = p + (1 - (price - min) / range) * (H - p*2);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    ctx.fillStyle = color + '12'; ctx.fill();
    const lastY = p + (1 - (prices[prices.length-1] - min) / range) * (H - p*2);
    ctx.beginPath(); ctx.arc(W-2, lastY, 2.5, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
  }

  function fmtUsd(n) {
    return n >= 1000 ? '$' + Math.round(n).toLocaleString('no-NO') : '$' + Number(n).toFixed(2);
  }

  let cachedBtcPrices = [], cachedEthPrices = [], cachedBtcColor = '#00cc44', cachedEthColor = '#00cc44';

  /* Henter 24H historikk fra CoinCap (intervall hvert 15. min = 96 punkter) */
  async function fetchCharts() {
    const end = Date.now();
    const start = end - 24 * 60 * 60 * 1000;

    try {
      const btcR = await fetch(`https://api.coincap.io/v2/assets/bitcoin/history?interval=m15&start=${start}&end=${end}`);
      const btcD = await btcR.json();
      cachedBtcPrices = btcD.data.map(p => parseFloat(p.priceUsd));
      const btcCur = cachedBtcPrices[cachedBtcPrices.length-1], btcOpen = cachedBtcPrices[0];
      const btcChg = ((btcCur - btcOpen) / btcOpen) * 100;
      document.getElementById('btc-price').textContent = fmtUsd(btcCur);
      const btcChgEl = document.getElementById('btc-change');
      btcChgEl.textContent = (btcChg >= 0 ? '▲' : '▼') + Math.abs(btcChg).toFixed(2) + '%';
      cachedBtcColor = btcChg >= 0 ? '#00cc44' : '#ff2222';
      btcChgEl.className = 'chart-change ' + (btcChg >= 0 ? 'pos' : 'neg');
      document.getElementById('btc-hl').innerHTML = `H: ${fmtUsd(Math.max(...cachedBtcPrices))}<br>L: ${fmtUsd(Math.min(...cachedBtcPrices))}`;
      drawChart('btc-chart', cachedBtcPrices, cachedBtcColor);
    } catch(e) {
      document.getElementById('btc-price').innerHTML = '<span class="err">API ERR</span>';
    }

    try {
      const ethR = await fetch(`https://api.coincap.io/v2/assets/ethereum/history?interval=m15&start=${start}&end=${end}`);
      const ethD = await ethR.json();
      cachedEthPrices = ethD.data.map(p => parseFloat(p.priceUsd));
      const ethCur = cachedEthPrices[cachedEthPrices.length-1], ethOpen = cachedEthPrices[0];
      const ethChg = ((ethCur - ethOpen) / ethOpen) * 100;
      document.getElementById('eth-price').textContent = fmtUsd(ethCur);
      const ethChgEl = document.getElementById('eth-change');
      ethChgEl.textContent = (ethChg >= 0 ? '▲' : '▼') + Math.abs(ethChg).toFixed(2) + '%';
      cachedEthColor = ethChg >= 0 ? '#00cc44' : '#ff2222';
      ethChgEl.className = 'chart-change ' + (ethChg >= 0 ? 'pos' : 'neg');
      document.getElementById('eth-hl').innerHTML = `H: ${fmtUsd(Math.max(...cachedEthPrices))}<br>L: ${fmtUsd(Math.min(...cachedEthPrices))}`;
      drawChart('eth-chart', cachedEthPrices, cachedEthColor);
    } catch(e) {
      document.getElementById('eth-price').innerHTML = '<span class="err">API ERR</span>';
    }
  }

  /* ALT COINS via CoinCap */
  async function fetchMiniCrypto() {
    const ids = 'bitcoin,ethereum,solana,ripple,binance-coin,cardano,polkadot,avalanche';
    try {
      const r = await fetch(`https://api.coincap.io/v2/assets?ids=${ids}`);
      const d = await r.json();

      /* CoinCap returnerer ikke nødvendigvis i riktig rekkefølge */
      const order = ['bitcoin','ethereum','solana','ripple','binance-coin','cardano','polkadot','avalanche'];
      const syms  = { bitcoin:'BTC', ethereum:'ETH', solana:'SOL', ripple:'XRP',
                      'binance-coin':'BNB', cardano:'ADA', polkadot:'DOT', avalanche:'AVAX' };

      const map = {};
      d.data.forEach(a => { map[a.id] = a; });

      const coins = order.map(id => ({
        sym:  syms[id],
        usd:  parseFloat(map[id]?.priceUsd || 0),
        chg:  parseFloat(map[id]?.changePercent24Hr || 0),
      }));

      const half = Math.ceil(coins.length / 2);

      function makeRows(arr) {
        return arr.map(c => {
          const cls = c.chg >= 0 ? 'pos' : 'neg', arrow = c.chg >= 0 ? '▲' : '▼';
          return `<tr>
            <td class="mc-name">${c.sym}</td>
            <td class="mc-price">${fmtUsd(c.usd)}</td>
            <td class="mc-change ${cls}">${arrow} ${Math.abs(c.chg).toFixed(1)}%</td>
          </tr>`;
        }).join('');
      }

      document.getElementById('mini-crypto-content').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 8px;width:100%">
          <table class="mini-crypto">${makeRows(coins.slice(0, half))}</table>
          <table class="mini-crypto">${makeRows(coins.slice(half))}</table>
        </div>`;

      const items = coins.map(c => {
        const cls = c.chg >= 0 ? 'pos' : 'neg', arrow = c.chg >= 0 ? '▲' : '▼';
        return `<span class="tick-item"><span class="tick-sym">${c.sym}</span><span class="tick-price">${fmtUsd(c.usd)}</span><span class="${cls}">${arrow} ${Math.abs(c.chg).toFixed(2)}%</span></span>`;
      });
      document.getElementById('ticker-track').innerHTML = [...items,...items,...items,...items].join('');

    } catch(e) {
      document.getElementById('mini-crypto-content').innerHTML = '<span class="err">FEIL VED HENTING</span>';
    }
  }

  async function fetchUsdNok() {
    try {
      const r = await fetch('https://open.er-api.com/v6/latest/USD');
      if (!r.ok) throw new Error();
      const d = await r.json();
      const rate = d.rates.NOK;
      document.getElementById('usdnok-val').innerHTML = `<div class="usdnok-val">${rate.toFixed(4)}</div>`;
      document.getElementById('usdnok-sub').textContent = `1 USD = ${rate.toFixed(2)} NOK`;
    } catch(e) {
      document.getElementById('usdnok-val').innerHTML = '<span class="err">ERR</span>';
    }
  }

  async function fetchFearGreed() {
    try {
      const r = await fetch('https://api.alternative.me/fng/?limit=1');
      const d = await r.json();
      const val = parseInt(d.data[0].value);
      const label = d.data[0].value_classification.toUpperCase();
      const color = val < 25 ? 'var(--red)' : val < 50 ? '#ff8800' : val < 75 ? '#aacc00' : 'var(--green)';
      document.getElementById('fg-val').innerHTML = `
        <div style="display:flex;align-items:baseline;gap:8px;">
          <div class="fg-value" style="color:${color}">${val}</div>
          <div style="font-size:9px;color:var(--grey)">${label}</div>
        </div>
        <div class="fg-bar-wrap">
          <div class="fg-bar"></div>
          <div class="fg-needle" style="left:${val}%"></div>
        </div>`;
    } catch(e) {
      document.getElementById('fg-val').innerHTML = '<span class="err">ERR</span>';
    }
  }

  window.addEventListener('resize', () => {
    if (cachedBtcPrices.length) drawChart('btc-chart', cachedBtcPrices, cachedBtcColor);
    if (cachedEthPrices.length) drawChart('eth-chart', cachedEthPrices, cachedEthColor);
  });

  const notesKey = 'crypto_web_launcher_v1';
  const notesEl = document.getElementById('notes-area');
  try { notesEl.value = localStorage.getItem(notesKey) || ''; } catch(e) {}
  notesEl.addEventListener('input', () => { try { localStorage.setItem(notesKey, notesEl.value); } catch(e) {} });

  fetchWeather();
  fetchUsdNok();
  fetchFearGreed();
  fetchMiniCrypto();
  setTimeout(fetchCharts, 500);

  setInterval(fetchMiniCrypto, 60000);
  setInterval(fetchCharts,    300000);
  setInterval(fetchWeather,   300000);
  setInterval(fetchUsdNok,    300000);
  setInterval(fetchFearGreed, 300000);
</script>
</body>
</html>
